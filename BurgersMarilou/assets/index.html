<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Stap voor stap burgers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="choice-view" class="view choice-view" aria-labelledby="home-title">
        <div class="intro">
          <p class="kicker">stap voor stap</p>
          <h1 id="home-title">Kies je burger</h1>
          <p class="intro-copy">Open het stappenplan op je mobiel en bouw de burger rustig laag per laag op.</p>
        </div>

        <div class="choice-list" aria-label="Burgerkeuze">
          <button class="burger-card" type="button" data-recipe="viva">
            <span class="poster-strip" style="background-image: url('assets/viva-zapata.png')"></span>
            <span class="card-copy">
              <span class="card-kicker">Mexicaans fris</span>
              <span class="card-title">Viva Zapata</span>
              <span class="card-meta">6 stappen</span>
            </span>
          </button>

          <button class="burger-card" type="button" data-recipe="bonanza">
            <span class="poster-strip" style="background-image: url('assets/bonanza.jpg')"></span>
            <span class="card-copy">
              <span class="card-kicker">Rokerig & klassiek</span>
              <span class="card-title">Bonanza</span>
              <span class="card-meta">5 stappen</span>
            </span>
          </button>
        </div>
      </section>

      <section id="recipe-view" class="view recipe-view is-hidden" aria-live="polite">
        <header class="recipe-header">
          <button class="back-button" type="button" aria-label="Terug naar burgerkeuze">
            <span aria-hidden="true">‹</span>
          </button>
          <div>
            <p class="kicker">stap voor stap</p>
            <h2 id="recipe-title">Viva Zapata</h2>
            <p class="subtitle">Opbouw van de burger</p>
          </div>
        </header>

        <div class="progress-wrap" aria-hidden="true">
          <span id="progress-fill"></span>
        </div>

        <ol id="steps-list" class="steps-list"></ol>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
